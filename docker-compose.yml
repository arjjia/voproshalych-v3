name: voproshalych-v3

services:
  postgres:
    build:
      context: ./db/postgres
      dockerfile: Dockerfile
    container_name: v3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voproshalych}
      POSTGRES_USER: ${POSTGRES_USER:-voproshalych}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voproshalych}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "psql", "-h", "localhost", "-p", "5432", "-U", "voproshalych", "-d", "voproshalych", "-c", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - v3-net

  db-migrate:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: v3-db-migrate
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-voproshalych}
      POSTGRES_USER: ${POSTGRES_USER:-voproshalych}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voproshalych}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - v3-net

  redis:
    image: redis:7-alpine
    container_name: v3-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - v3-net

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: v3-litellm
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    env_file:
      - .env
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-key-v3}
      LITELLM_CONFIG_FILE: /app/config.yaml
      DATABASE_URL: postgresql://voproshalych:voproshalych@postgres:5432/voproshalych
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "opencode.ai:172.65.90.21"
      - "openrouter.ai:104.18.3.115"
      - "api.mistral.ai:172.66.2.203"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - v3-net

  kb-service:
    build:
      context: ./kb-service
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
    container_name: v3-kb-service
    restart: unless-stopped
    ports:
      - "8005:8004"
    env_file:
      - .env
    volumes:
      - ./scripts:/app/scripts
      - hf-cache:/hf-cache
    environment:
      KB_PORT: 8004
      HF_HUB_OFFLINE: "1"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - v3-net

  mcp-kb:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile.kb
    container_name: v3-mcp-kb
    restart: unless-stopped
    ports:
      - "${MCP_KB_PORT:-9010}:9010"
    env_file:
      - .env
    environment:
      MCP_SERVER_TYPE: kb
      MCP_PORT: 9010
      QA_SERVICE_URL: http://kb-service:8004
    depends_on:
      kb-service:
        condition: service_started
    networks:
      - v3-net

  mcp-news:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile.public
    container_name: v3-mcp-news
    restart: unless-stopped
    ports:
      - "${MCP_NEWS_PORT:-9011}:9011"
    env_file:
      - .env
    environment:
      MCP_SERVER_TYPE: news
      MCP_PORT: 9011
    networks:
      - v3-net

  mcp-fetch:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile.public
    container_name: v3-mcp-fetch
    restart: unless-stopped
    ports:
      - "${MCP_FETCH_PORT:-9015}:9015"
    env_file:
      - .env
    environment:
      MCP_SERVER_TYPE: fetch
      MCP_PORT: 9015
    networks:
      - v3-net

  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: v3-agent
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-8001}:8001"
    env_file:
      - .env
    environment:
      AGENT_PORT: 8001
      LLM_API_BASE: http://litellm:4000/v1
      LLM_API_KEY: ${LITELLM_MASTER_KEY}
    depends_on:
      kb-service:
        condition: service_started
      litellm:
        condition: service_started
    networks:
      - v3-net

  bot-core:
    build:
      context: ./bot-service/core
      dockerfile: Dockerfile
    container_name: v3-bot-core
    restart: unless-stopped
    ports:
      - "${BOT_CORE_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      BOT_CORE_APP_NAME: ${BOT_CORE_APP_NAME:-bot-core}
      BOT_CORE_APP_VERSION: ${BOT_CORE_APP_VERSION:-0.1.0}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-voproshalych}
      POSTGRES_USER: ${POSTGRES_USER:-voproshalych}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voproshalych}
      AGENT_SERVICE_URL: http://agent-service:8001
      AGENT_SERVICE_TIMEOUT_SECONDS: ${AGENT_SERVICE_TIMEOUT_SECONDS:-300}
      DIALOG_CONTEXT_MAX_CHARS: ${DIALOG_CONTEXT_MAX_CHARS:-3000}
      DIALOG_CONTEXT_MAX_MESSAGES: ${DIALOG_CONTEXT_MAX_MESSAGES:-3}
      HOLIDAY_NEWSLETTER_ENABLED: ${HOLIDAY_NEWSLETTER_ENABLED:-true}
      HOLIDAY_NEWSLETTER_RUN_HOUR: ${HOLIDAY_NEWSLETTER_RUN_HOUR:-9}
      HOLIDAY_NEWSLETTER_RUN_MINUTE: ${HOLIDAY_NEWSLETTER_RUN_MINUTE:-0}
    depends_on:
      agent-service:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - v3-net

  lobe-chat:
    build:
      context: ../
      dockerfile: voproshalych_v3/lobe-chat/Dockerfile
    container_name: v3-lobe-chat
    ports:
      - "3210:3210"
    env_file:
      - .env
    environment:
      APP_URL: ${APP_URL:-http://localhost:3210}
      OPENAI_API_KEY: sk-no-key-required
      OPENAI_PROXY_URL: http://agent-service:8001/v1
      OPENAI_MODEL_LIST: "voproshalych-v3=Вопрошалыч,nemotron-ultra-free=Nemotron Ultra,nemotron-super-or=Nemotron Super,deepseek-v4-flash-free=DeepSeek V4 Flash,gpt-oss-or=GPT OSS,llama-70b-or=Llama 70B,qwen-coder-or=Qwen Coder,gemma-31b-or=Gemma 3 1B,mimo-free=Mimo,code-free=Code,pickle-free=Pickle,mistral-nemo=Mistral Nemo,mistral-classifier=Mistral Classifier,hy3-free=HY3 Free"
      DEFAULT_AGENT_CONFIG: model=voproshalych-v3
      FEATURE_FLAGS: "-welcome_suggest,-market,-dalle,-plugins,-knowledge_base,-speech_to_text,-ai_image,-changelog,-check_updates,-openai_api_key,-openai_proxy_url,-language_model_settings,-provider_settings,-create_session,-edit_agent,-import,-export,-share,-discover"
      SSRF_ALLOW_PRIVATE_IP_ADDRESS: "1"
      ENABLED_OPENAI: "1"
      ENABLED_OLLAMA: "0"
      KEY_VAULTS_SECRET: ${KEY_VAULTS_SECRET:-changeme-dev-secret-v3}
      DATABASE_DRIVER: node
      DATABASE_URL: postgresql://${POSTGRES_USER:-voproshalych}:${POSTGRES_PASSWORD:-voproshalych}@postgres:5432/lobechat
      AUTH_SECRET: ${AUTH_SECRET:-changeme-auth-secret-v3}
      AUTH_SSO_PROVIDERS: ""
      AUTH_DISABLE_EMAIL_PASSWORD: "0"
      AUTH_EMAIL_VERIFICATION: "0"
      AUTH_ENABLE_MAGIC_LINK: "0"
      CUSTOM_JS_URL: /custom.js
    depends_on:
      - agent-service
      - postgres
    networks:
      - v3-net

  bot-vk:
    build:
      context: ./bot-service/bots/vk
      dockerfile: Dockerfile
    container_name: v3-bot-vk
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_CORE_URL: http://bot-core:8000
      BOT_CORE_TIMEOUT_SECONDS: "60"
    depends_on:
      - bot-core
    networks:
      - v3-net

  bot-max:
    build:
      context: ./bot-service/bots/max
      dockerfile: Dockerfile
    container_name: v3-bot-max
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_CORE_URL: http://bot-core:8000
      BOT_CORE_TIMEOUT_SECONDS: "60"
    depends_on:
      - bot-core
    networks:
      - v3-net

volumes:
  postgres_data:
  hf-cache:

networks:
  v3-net:
    driver: bridge
